---
# Deploy n8n orchestrator as rootless Podman container.
# Requires: vulnforge project dir, nuclei binary, and Podman socket
# mounted into the container so Execute Command nodes can run scans.

- name: Pull n8n image
  become: false
  command: podman pull docker.io/n8nio/n8n:latest
  changed_when: false

- name: Run n8n container
  become: false
  command: >
    podman run -d
    --name n8n
    --network vulnforge-net
    -p 5678:5678
    -v n8n_data:/home/node/.n8n:Z
    -v /home/vulnforge/vulnforge:/vulnforge:Z
    -v /home/vulnforge/.local/bin/nuclei:/usr/local/bin/nuclei:ro
    -v /run/user/1000/podman/podman.sock:/run/user/1000/podman/podman.sock:Z
    --env "DISCORD_WEBHOOK_URL={{ discord_webhook_url }}"
    --restart=unless-stopped
    docker.io/n8nio/n8n:latest
  register: n8n_result
  failed_when:
    - n8n_result.rc != 0
    - "'already in use' not in n8n_result.stderr"
  changed_when: n8n_result.rc == 0

# python3 is needed by parser.py (not in n8n Alpine image by default)
- name: Install python3 in n8n container
  become: false
  command: podman exec n8n apk add --no-cache python3
  changed_when: false

- name: Generate n8n systemd unit
  become: false
  shell: |
    mkdir -p ~/.config/systemd/user
    podman generate systemd --new --name n8n > ~/.config/systemd/user/n8n.service
  changed_when: false

- name: Enable and start n8n systemd unit
  become: false
  systemd:
    name: n8n
    scope: user
    enabled: true
    state: started
    daemon_reload: true
